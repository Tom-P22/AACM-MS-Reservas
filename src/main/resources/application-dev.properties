spring.application.name=ms-reservas

spring.datasource.url=jdbc:mysql://localhost:3314/bd_reservas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8084

# Conexion a ms-canchas
api.canchas.base-url=http://localhost:8083
# Conexion con Auth
jwt.secret=ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!

# Conexion con Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Swagger Config
springdoc.api-docs.path=/api/v1/reservas/v3/api-docs
springdoc.swagger-ui.path=/api/v1/reservas/doc/swagger-ui.html

springdoc.openapi.servers[0].url=http://localhost:8080
springdoc.openapi.servers[0].description=API Gateway (Entorno Local)

# Logback Config
logging.config=classpath:logback-spring.xml



