spring:
  application:
    name: ms-reservas
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8084

api:
  canchas:
    base-url: http://localhost:8083

jwt:
  secret: ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api/v1/reservas/v3/api-docs
  swagger-ui:
    path: /api/v1/reservas/doc/swagger-ui.html
  openapi:
    servers:
      - url: http://localhost:8080
        description: API Gateway (Entorno Local)

logging:
  config: classpath:logback-spring.xml